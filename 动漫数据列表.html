<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>动漫数据列表（仅显示核心字段）</title>
    <style>
        body {
            background: #f5f5f5;
            font-family: "微软雅黑";
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px #ddd;
        }
        .title {
            text-align: center;
            font-size: 24px;
            color: #333;
            margin-bottom: 20px;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            padding: 10px;
            background: #f0f8ff;
            border-radius: 5px;
        }
        .stat-item {
            text-align: center;
        }
        .stat-label {
            font-size: 14px;
            color: #666;
        }
        .stat-value {
            font-size: 20px;
            color: #0088ff;
            font-weight: bold;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px 12px;
            text-align: center;
        }
        th {
            background: #0088ff;
            color: white;
        }
        tr:nth-child(even) {
            background: #f8f8f8;
        }
        .rank {
            color: #ff6600;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">动漫数据列表（按追番数排序）</div>

        <!-- 数据统计（仅保留核心项） -->
        <div class="stats">
            <div class="stat-item">
                <div class="stat-label">总计动漫数量</div>
                <div class="stat-value" id="totalCount">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">最高追番数</div>
                <div class="stat-value" id="maxFollow">0</div>
            </div>
        </div>

        <!-- 数据表格（移除播放量、评分列） -->
        <table>
            <thead>
                <tr>
                    <th>排名</th>
                    <th>动漫名称</th>
                    <th>追番数</th>
                    <th>集数</th>
                </tr>
            </thead>
            <tbody id="dataTable">
                <tr>
                    <td colspan="4" style="color: #999;">正在读取JSON文件...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        // 读取本地JSON文件
        fetch('anime.json')
            .then(response => {
                if (!response.ok) {
                    throw new Error('请确保anime.json文件和当前HTML文件在同一个文件夹里！');
                }
                return response.json();
            })
            .then(data => {
                // 验证数据是否为数组
                if (!Array.isArray(data)) {
                    alert('JSON文件格式错误！请确保文件内容是数组格式 [ {...}, {...} ]');
                    return;
                }

                // 过滤有效数据（排除空对象）
                const validData = data.filter(item => item.anime_name);

                // 按追番数排序（从高到低）
                validData.sort((a, b) => {
                    // 解析追番数为数字
                    const parseFollow = (followStr) => {
                        if (!followStr) return 0;
                        followStr = followStr.replace('追番', '').trim();
                        if (followStr.includes('万')) {
                            return parseFloat(followStr.replace('万', '')) * 10000;
                        }
                        return parseFloat(followStr) || 0;
                    };
                    return parseFollow(b.follow_count) - parseFollow(a.follow_count);
                });

                // 更新统计信息（仅保留核心项）
                document.getElementById('totalCount').textContent = validData.length;

                // 最高追番数
                const maxFollowItem = validData[0] || { follow_count: '0' };
                document.getElementById('maxFollow').textContent = maxFollowItem.follow_count;

                // 渲染表格（移除播放量、评分列）
                const tableBody = document.getElementById('dataTable');
                tableBody.innerHTML = '';

                validData.forEach((item, index) => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td class="rank">${index + 1}</td>
                        <td>${item.anime_name || '未知'}</td>
                        <td>${item.follow_count || '0'}</td>
                        <td>${item.release_time || '未知'}</td>
                    `;
                    tableBody.appendChild(tr);
                });
            })
            .catch(error => {
                const tableBody = document.getElementById('dataTable');
                tableBody.innerHTML = `<tr><td colspan="4" style="color: red;">读取失败：${error.message}</td></tr>`;
                console.error('读取错误：', error);
            });
    </script>
</body>
</html>
